services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ./data:/data
    expose:
      - "8080"
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - bot
    ports:
      - "80:80"
      - "443:443"
    environment:
      WEBHOOK_DOMAIN: ${WEBHOOK_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
    restart: unless-stopped
